name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - if: github.ref == 'refs/heads/main'
        name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ab035def4397eb303fd15e3f06917991
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not set — skipping deploy"
            exit 0
          fi
          for i in 1 2 3; do
            npx --yes wrangler@3 pages deploy out --project-name=noctune --branch main 2>&1 && break
            echo "Deploy attempt $i failed, retrying in 10s..."
            sleep 10
          done